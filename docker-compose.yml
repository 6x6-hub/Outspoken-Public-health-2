version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: outspoken-db
    environment:
      POSTGRES_USER: ${DATABASE_USER:-outspoken}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-secure_password}
      POSTGRES_DB: ${DATABASE_NAME:-outspoken_health}
    ports:
      - "${DATABASE_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - outspoken-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-outspoken}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: outspoken-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - outspoken-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: outspoken-api
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${DATABASE_USER:-outspoken}:${DATABASE_PASSWORD:-secure_password}@postgres:5432/${DATABASE_NAME:-outspoken_health}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_in_production}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: 3001
    ports:
      - "${PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./uploads:/app/uploads
    networks:
      - outspoken-network
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: outspoken-web
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3001
      REACT_APP_ENV: ${NODE_ENV:-development}
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    networks:
      - outspoken-network
    command: npm run dev

volumes:
  postgres_data:
  redis_data:

networks:
  outspoken-network:
    driver: bridge
